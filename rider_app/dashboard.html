<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rider Dashboard - QuickDash</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="app-header">
        <div class="header-left">
            <h3>Rider Panel</h3>
            <span id="rider-status" class="badge-offline">Offline</span>
        </div>
        <div class="header-right">
            <label class="switch">
                <input type="checkbox" id="online-toggle" onchange="toggleOnline(this)">
                <span class="slider round"></span>
            </label>
            <button onclick="logout()" class="btn-icon"><i class="fas fa-power-off"></i></button>
        </div>
    </header>

    <main class="app-content">
        <div class="stats-row">
            <div class="stat-card">
                <h2 id="today-earnings">₹0</h2>
                <span>Today's Earnings</span>
            </div>
            <div class="stat-card">
                <h2 id="today-orders">0</h2>
                <span>Orders Done</span>
            </div>
        </div>

        <div class="job-container">
            <h4 style="margin-bottom: 15px; color: #666;">Active Tasks</h4>
            <div id="active-job-area">
                <div class="no-job">
                    <i class="fas fa-motorcycle"></i>
                    <p>Scanning for orders...</p>
                    <div class="pulse-ring"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.service.js"></script>
    <script src="assets/js/pages/rider-dashboard.js" defer></script>
</body>
</html>
